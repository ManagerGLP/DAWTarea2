<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Dashboard</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-header">
        <div class="container">
            <div class="row user-info">
                <div class="col-md-8 d-flex align-items-center">
                    <div class="user-avatar">
                        JD
                    </div>
                    <div>
                        <h4 class="mb-0">Eduardo Amaya</h4>
                        <small>Cuenta: ****1234</small>
                    </div>
                </div>
                <div class="col-md-4 text-right">
                    <a href="atm-login.html" class="btn logout-btn">
                        <i class="fas fa-sign-out-alt"></i> Salir
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row mb-4">
            <div class="col-12">
                <h2 class="text-center mb-4">Pokemon Bank</h2>
            </div>
        </div>


        <div class="row mb-5">
            <div class="col-lg-3 col-md-6 mb-3">
                <button class="action-btn w-100">
                    <i class="fas fa-plus-circle"></i>
                    <h5>Depositar</h5>
                </button>
            </div>
            <div class="col-lg-3 col-md-6 mb-3">
                <a href="atm-withdraw.html" class="action-btn w-100" style="text-decoration: none; color: inherit; display: inline-block;">
                    <i class="fas fa-minus-circle"></i>
                    <h5>Retirar</h5>
                </a>
            </div>
            <div class="col-lg-3 col-md-6 mb-3">
                <button class="action-btn w-100">
                    <i class="fas fa-balance-scale"></i>
                    <h5>Balance</h5>
                </button>
            </div>
            <div class="col-lg-3 col-md-6 mb-3">
                <a href="atm-analytics.html" class="action-btn w-100" style="text-decoration: none; color: inherit; display: inline-block;">
                    <i class="fas fa-chart-bar"></i>
                    <h5>Analytics</h5>
                </a>
            </div>
            <div class="col-lg-3 col-md-6 mb-3">
                <a href="atm-services.html" class="action-btn w-100" style="text-decoration: none; color: inherit; display: inline-block;">
                    <i class="fas fa-receipt"></i>
                    <h5>Pagar servicios</h5>
                </a>
            </div>
        </div>


        <div class="row">
            <div class="col-lg-6 mb-4">
                <div class="chart-container">
                    <h5 class="mb-3">Resumen de Transacciones</h5>
                    <canvas id="transactionChart"></canvas>
                </div>
            </div>
            <div class="col-lg-6 mb-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0">Transacciones Recientes</h5>
                    <a href="atm-history.html" class="btn btn-sm btn-outline-primary">
                        <i class="fas fa-chevron-down"></i> Ver más
                    </a>
                </div>
                <div class="history-item">
                    <div class="d-flex justify-content-between">
                        <div>
                            <strong>Deposito</strong>
                            <br>
                            <small class="text-muted">15 Marzo, 2026</small>
                        </div>
                        <div class="text-success">
                            +$500.00
                        </div>
                    </div>
                </div>
                <div class="history-item">
                    <div class="d-flex justify-content-between">
                        <div>
                            <strong>Retiro</strong>
                            <br>
                            <small class="text-muted">14 Marzo, 2026</small>
                        </div>
                        <div class="text-danger">
                            -$200.00
                        </div>
                    </div>
                </div>
                <div class="history-item">
                    <div class="d-flex justify-content-between">
                        <div>
                            <strong>Hacer pagos</strong>
                            <br>
                            <small class="text-muted">13 Marzo, 2026</small>
                        </div>
                        <div class="text-danger">
                            -$50.00
                        </div>
                    </div>
                </div>
                <div class="history-item">
                    <div class="d-flex justify-content-between">
                        <div>
                            <strong>Deposito</strong>
                            <br>
                            <small class="text-muted">12 Marzo, 2026</small>
                        </div>
                        <div class="text-success">
                            +$1000.00
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <script>
        const ctx = document.getElementById('transactionChart').getContext('2d');
        const transactionChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Balance',
                    data: [1200, 1900, 3000, 5000, 2000, 3000],
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
