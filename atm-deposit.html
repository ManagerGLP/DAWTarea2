<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposito</title>
</head>
<body>
    <h1>Deposito</h1>

    <form>
        <div>
            <label for="depositAmount">Monto a depositar</label>
            <input type="number" id="depositAmount" name="depositAmount" placeholder="100.00">
        </div>

        <div>
            <label for="depositType">Tipo de deposito</label>
            <select id="depositType" name="depositType">
                <option>Efectivo</option>
                <option>Cheque</option>
                <option>Transferencia</option>
            </select>
        </div>

        <div>
            <label for="depositNote">Descripcion</label>
            <input type="text" id="depositNote" name="depositNote" placeholder="Deposito en ventanilla">
        </div>

        <button type="button">Confirmar deposito</button>
    </form>

    <p>
        <a href="atm-dashboard.html">Volver al dashboard</a>
    </p>
</body>
</html>
